<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - GitHub Issues Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-900 min-h-screen flex items-center justify-center">

    <div class="card w-full max-w-md bg-white shadow-xl p-8 rounded-xl">

        <div class="text-center mb-6">
            <img src="assets/github-logo.png" alt="GitHub Logo" class="w-16 h-16 mx-auto mb-3">
            <h1 class="text-2xl font-bold text-gray-800">GitHub Issues Tracker</h1>
            <p class="text-gray-500 text-sm mt-1">Sign in to manage your issues</p>
        </div>

        <form id="loginForm">
            <div class="mb-4">
                <label class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
                <input type="text" id="username" placeholder="Enter Username" class="input input-bordered w-full">
                <p class="text-xs text-blue-500 mt-1">Default: admin</p>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                <input type="password" id="password" placeholder="Enter Password" class="input input-bordered w-full">
                <p class="text-xs text-blue-500 mt-1">Default: admin123</p>
            </div>

            <p id="errorMsg" class="text-red-500 text-sm text-center mb-3 hidden">Wrong username or password!</p>

            <button type="submit" class="btn w-full text-white" style="background-color: #6c3beb;">Sign In</button>
        </form>

        <div class="divider text-gray-400 text-sm my-5">OR</div>

        <div class="text-center">
            <p class="text-gray-500 text-sm mb-2">Demo Credentials:</p>
            <div class="bg-gray-100 rounded-lg p-4">
                <p class="text-sm"><span class="font-bold">Username:</span> admin</p>
                <p class="text-sm"><span class="font-bold">Password:</span> admin123</p>
            </div>
        </div>

    </div>

    <script src="login.js"></script>
</body>

</html>
